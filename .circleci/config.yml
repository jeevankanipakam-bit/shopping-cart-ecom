version: 2.1

jobs:
  build-and-push:
    docker:
      - image: cimg/node:18.0
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Install AWS CLI
          command: sudo apt update && sudo apt install -y awscli
      - run:
          name: Login to AWS ECR
          command: |
            aws ecr get-login-password --region ap-south-1 | \
              docker login --username AWS --password-stdin \
              320042238069.dkr.ecr.ap-south-1.amazonaws.com
      - run:
          name: Build Docker Image
          command: docker build -t shopping-cart .
      - run:
          name: Tag and Push to ECR
          command: |
            docker tag shopping-cart:latest \
              320042238069.dkr.ecr.ap-south-1.amazonaws.com/shopping-cart:latest
            docker push \
              320042238069.dkr.ecr.ap-south-1.amazonaws.com/shopping-cart:latest
      - run:
          name: Log Build Success
          command: |
            echo "Build and Push to ECR completed successfully at $(date)"
      - on_fail:
          - run:
              name: Log Build Failure
              command: |
                echo "ERROR: Build and Push to ECR failed at $(date)" >> /tmp/pipeline_errors.log
                cat /tmp/pipeline_errors.log

  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - attach_workspace:
          at: /tmp
      - run:
          name: Install AWS CLI
          command: sudo apt update && sudo apt install -y awscli
      - run:
          name: Setup SSH key
          command: |
            mkdir -p ~/.ssh
            echo "$EC2_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa
      - run:
          name: Verify EC2 IP
          command: |
            if [ -f /tmp/ec2_ip.txt ]; then
              echo "EC2 IP found: $(cat /tmp/ec2_ip.txt)"
            else
              echo "ERROR: EC2 IP file not found"
              exit 1
            fi
      - run:
          name: Wait for EC2 SSH
          command: |
            EC2_IP=$(cat /tmp/ec2_ip.txt)
            echo "Waiting for SSH on $EC2_IP ..."
            for i in $(seq 1 30); do
              if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
                   ubuntu@$EC2_IP "echo ok" 2>/dev/null; then
                echo "EC2 is reachable"
                break
              fi
              echo "Attempt $i/30 — retrying in 10s"
              sleep 10
            done
      - run:
          name: Wait for Docker on EC2
          command: |
            EC2_IP=$(cat /tmp/ec2_ip.txt)
            ssh -o StrictHostKeyChecking=no ubuntu@$EC2_IP \
              "for i in \$(seq 1 20); do
                 command -v docker && echo 'docker ready' && break
                 echo 'waiting for docker...'
                 sleep 10
               done"
      - run:
          name: Clone or update repo on EC2
          command: |
            EC2_IP=$(cat /tmp/ec2_ip.txt)
            ssh -o StrictHostKeyChecking=no ubuntu@$EC2_IP "
              if [ ! -d /home/ubuntu/E-commerce-website ]; then
                git clone https://github.com/jeevankanipakam-bit/shopping-cart-ecom.git \
                  /home/ubuntu/E-commerce-website
              else
                cd /home/ubuntu/E-commerce-website && git pull
              fi
            "
      - run:
          name: Write .env file on EC2
          command: |
            EC2_IP=$(cat /tmp/ec2_ip.txt)
            {
              echo "POSTGRES_USER=admin"
              echo "POSTGRES_PASSWORD=User@2022"
              echo "POSTGRES_DB=ShoppingCart"
              echo "ENVIRONMENT=Development"
              echo "TokenKey=Fn96MkrL3D5RQDL333423JHG23dRJ7tfhA6URq3ax5nDh26UmCNZDq"
              echo "AdminPassword=AdminUser@2022"
              echo 'DefaultConnection="host=database;port=5432;username=admin;password=User@2021;database=ShoppingCart"'
            } > /tmp/app.env
            scp -o StrictHostKeyChecking=no /tmp/app.env \
              ubuntu@$EC2_IP:/home/ubuntu/E-commerce-website/E-commerce-website-main/.env
      - run:
          name: Pull ECR image and start app
          command: |
            EC2_IP=$(cat /tmp/ec2_ip.txt)
            ssh -o StrictHostKeyChecking=no ubuntu@$EC2_IP "
              aws ecr get-login-password --region ap-south-1 | \
                sudo docker login --username AWS --password-stdin \
                320042238069.dkr.ecr.ap-south-1.amazonaws.com &&
              sudo docker pull \
                320042238069.dkr.ecr.ap-south-1.amazonaws.com/shopping-cart:latest &&
              sudo docker tag \
                320042238069.dkr.ecr.ap-south-1.amazonaws.com/shopping-cart:latest \
                shopping-cart:latest &&
              cd /home/ubuntu/E-commerce-website/E-commerce-website-main &&
              sudo docker-compose down &&
              sudo docker-compose up -d
            "
      - run:
          name: Log Deployment Success
          command: |
            echo "Deployment completed successfully at $(date)" >> /tmp/deployment_log.txt
      - on_fail:
          - run:
              name: Log Deployment Error
              command: |
                ERROR_MSG="ERROR: Deployment failed at $(date) for branch: $CIRCLE_BRANCH commit: $CIRCLE_SHA1"
                echo "$ERROR_MSG" >> /tmp/pipeline_errors.log
                echo "Deployment Error: $ERROR_MSG"

  notify-failure:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Send Error Notification
          command: |
            echo "PIPELINE FAILURE ALERT"
            echo "======================="
            echo "Build/Deploy pipeline failed"
            echo "Repository: $CIRCLE_REPOSITORY_URL"
            echo "Branch: $CIRCLE_BRANCH"
            echo "Commit: $CIRCLE_SHA1"
            echo "Time: $(date)"
            echo ""
            echo "Check CircleCI dashboard for details: $CIRCLE_BUILD_URL"

workflows:
  version: 2
  build-deploy:
    jobs:
      - build-and-push
      - deploy:
          requires:
            - build-and-push
      - notify-failure:
          requires:
            - build-and-push
            - deploy
          when: on_fail
