version: 2.1

jobs:
  build-and-push:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Install AWS CLI
          command: |
            sudo apt-get update -y
            sudo apt-get install -y python3 python3-pip curl
            pip3 install --upgrade awscli
      - run:
          name: Validate ECR configuration
          command: |
            if [ -z "$AWS_ACCOUNT_ID" ] || [ -z "$AWS_DEFAULT_REGION" ] || [ -z "$ECR_REPOSITORY" ]; then
              echo "AWS_ACCOUNT_ID, AWS_DEFAULT_REGION and ECR_REPOSITORY must be set"
              exit 1
            fi
      - run:
          name: Authenticate to ECR
          command: |
            ECR_REGISTRY="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
            aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | \
              docker login --username AWS --password-stdin "$ECR_REGISTRY"
      - run:
          name: Build Docker image
          command: |
            ECR_REGISTRY="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
            docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" .
      - run:
          name: Push Docker image to ECR
          command: |
            ECR_REGISTRY="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
            docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
      - run:
          name: Build and push success
          command: echo "Docker image pushed to ECR successfully"

  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Install AWS CLI
          command: |
            sudo apt-get update -y
            sudo apt-get install -y python3 python3-pip curl
            pip3 install --upgrade awscli
      - run:
          name: Setup SSH key
          command: |
            mkdir -p ~/.ssh
            echo "$EC2_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa
      - run:
          name: Validate deploy configuration
          command: |
            if [ -z "$EC2_HOST" ] || [ -z "$DEPLOYMENT_USER" ] || [ -z "$DEPLOYMENT_PATH" ] || [ -z "$AWS_ACCOUNT_ID" ] || [ -z "$AWS_DEFAULT_REGION" ] || [ -z "$ECR_REPOSITORY" ] || [ -z "$GIT_REPOSITORY_URL" ]; then
              echo "EC2_HOST, DEPLOYMENT_USER, DEPLOYMENT_PATH, AWS_ACCOUNT_ID, AWS_DEFAULT_REGION, ECR_REPOSITORY and GIT_REPOSITORY_URL must be set"
              exit 1
            fi
      - run:
          name: Verify EC2 connectivity
          command: |
            for i in $(seq 1 30); do
              if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 "$DEPLOYMENT_USER@$EC2_HOST" "echo ok" 2>/dev/null; then
                echo "EC2 is reachable"
                exit 0
              fi
              echo "Waiting for SSH on $EC2_HOST... ($i/30)"
              sleep 10
            done
            echo "ERROR: Cannot reach EC2 via SSH"
            exit 1
      - run:
          name: Install Docker, Git, and Docker Compose on EC2
          command: |
            ssh -o StrictHostKeyChecking=no "$DEPLOYMENT_USER@$EC2_HOST" "
              sudo apt-get update -y &&
              sudo apt-get install -y docker.io git curl &&
              sudo systemctl enable docker &&
              sudo systemctl start docker &&
              sudo mkdir -p /usr/local/lib/docker/cli-plugins &&
              if ! command -v docker-compose >/dev/null 2>&1; then
                sudo curl -L \"https://github.com/docker/compose/releases/download/v2.18.1/docker-compose-$(uname -s)-$(uname -m)\" -o /usr/local/lib/docker/cli-plugins/docker-compose &&
                sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
              fi
            "
      - run:
          name: Clone or update repo on EC2
          command: |
            ssh -o StrictHostKeyChecking=no "$DEPLOYMENT_USER@$EC2_HOST" "
              if [ ! -d $DEPLOYMENT_PATH ]; then
                git clone $GIT_REPOSITORY_URL $DEPLOYMENT_PATH
              else
                cd $DEPLOYMENT_PATH && git pull
              fi
            "
      - run:
          name: Copy environment file to EC2
          command: |
            if [ -f .circleci/.env ]; then
              scp -o StrictHostKeyChecking=no .circleci/.env "$DEPLOYMENT_USER@$EC2_HOST:$DEPLOYMENT_PATH/.env"
            else
              scp -o StrictHostKeyChecking=no .circleci/.env.example "$DEPLOYMENT_USER@$EC2_HOST:$DEPLOYMENT_PATH/.env"
            fi
      - run:
          name: Deploy app on EC2 with Docker Compose
          command: |
            ssh -o StrictHostKeyChecking=no "$DEPLOYMENT_USER@$EC2_HOST" "
              sudo aws ecr get-login-password --region $AWS_DEFAULT_REGION | sudo docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com &&
              cd $DEPLOYMENT_PATH &&
              sudo docker compose pull || sudo docker-compose pull || true &&
              sudo docker compose down || sudo docker-compose down || true &&
              sudo docker compose up -d --no-build || sudo docker-compose up -d --no-build
            "
      - run:
          name: Deployment success
          command: echo "Application deployed to EC2 successfully"

workflows:
  build-deploy:
    jobs:
      - build-and-push
      - deploy:
          requires:
            - build-and-push
